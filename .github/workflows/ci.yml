name: Build, Push and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_URL_API=${{ secrets.NEXT_PUBLIC_URL_API }}
            NEXT_PUBLIC_URL_API_AI=${{ secrets.NEXT_PUBLIC_URL_API_AI }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          tags: |
            ${{ secrets.DOCKER_IMAGE }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script: |
            echo "Starting deploy"

            cd web/social-media/frontend/

            echo "Stopping current services..."
            docker compose -f docker-compose.yml down

            echo "Cleaning up containers..."
            docker container prune -f

            echo "Removing old image..."
            docker rmi ${{ secrets.DOCKER_IMAGE }} || true

            echo "Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKER_IMAGE }}

            echo "Starting services..."
            docker compose -f docker-compose.yml up -d --force-recreate

            echo "Waiting for services..."
            sleep 30

            echo "Current containers:"
            docker compose -f docker-compose.yml ps

            echo "Deployment completed!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
